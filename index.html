<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ ลงชื่อเตะบอล</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f7fa;
      --surface:   #ffffff;
      --surface2:  #f0f2f5;
      --border:    rgba(0,0,0,.08);
      --border-hi: rgba(0,0,0,.14);
      --text:      #111827;
      --text-muted:#6b7280;
      --green:     #16a34a;
      --red:       #dc2626;
      --radius:    12px;
      --radius-sm: 8px;
    }

    body {
      font-family: "Kanit", system-ui, sans-serif;
      font-weight: 400;
      background: var(--bg);
      min-height: 100dvh;
      color: var(--text);
      padding: 16px;
      padding-bottom: 40px;
    }

    body::before {
      content: "";
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 10% -10%, rgba(34,197,94,.10) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 110%, rgba(139,92,246,.08) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; }

    /* ── Header ──────────────────────────────────────────── */
    .app-header { text-align: center; padding: 28px 0 24px; }
    .header-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; margin: 0 auto 14px;
      box-shadow: 0 8px 24px rgba(34,197,94,.35);
    }
    .app-header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: .3px; }
    .app-header p  { color: var(--text-muted); font-size: .88rem; margin-top: 4px; font-weight: 300; }

    /* ── Card ────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px; margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    /* ── Input ───────────────────────────────────────────── */
    .input-row { display: flex; gap: 8px; }
    .input-row input {
      flex: 1; background: var(--surface2);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); font-family: inherit; font-size: .95rem;
      padding: 11px 14px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-row input::placeholder { color: var(--text-muted); }
    .input-row input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(63,185,80,.15); }

    .input-error {
      font-size: .83rem; font-weight: 500; color: #dc2626;
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height .2s, margin-top .2s, opacity .2s;
    }
    .input-error.show { max-height: 40px; margin-top: 8px; opacity: 1; }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; padding: 11px 16px; border: none;
      border-radius: var(--radius-sm); font-family: inherit;
      font-size: .95rem; font-weight: 600; cursor: pointer;
      transition: filter .15s, transform .1s, opacity .15s;
      white-space: nowrap;
    }
    .btn:active  { transform: scale(.97); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn:not(:disabled):hover { filter: brightness(1.1); }

    .btn-green  { background: linear-gradient(135deg,#22c55e,#15803d); color:#fff; box-shadow:0 2px 10px rgba(22,163,74,.25); }
    .btn-purple { background: linear-gradient(135deg,#a78bfa,#6d28d9); color:#fff; box-shadow:0 2px 10px rgba(124,58,237,.25); }
    .btn-danger { background: var(--surface2); color: var(--red); border: 1px solid rgba(220,38,38,.2); }
    .btn-danger:not(:disabled):hover { background: #fef2f2; filter: none; }
    .btn-ghost  { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:not(:disabled):hover  { color: var(--text); filter: none; border-color: var(--border-hi); }

    .btn-icon {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 1rem; padding: 5px 7px;
      border-radius: 6px; transition: background .15s, color .15s; line-height: 1;
    }
    .btn-icon:hover { background: var(--surface2); color: var(--text); }

    /* ── Section label ───────────────────────────────────── */
    .section-label {
      font-size: .75rem; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .section-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }

    .count-pill {
      background: #dcfce7; color: #15803d; border-radius: 20px;
      padding: 1px 10px; font-size: .78rem; font-weight: 700;
    }

    /* ── Player list ─────────────────────────────────────── */
    .player-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 0; border-bottom: 1px solid var(--border);
      animation: slideIn .18s ease;
      position: relative;
    }
    .player-item:last-child { border-bottom: none; }

    .player-num {
      width: 26px; height: 26px; background: var(--surface2);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-size: .78rem; font-weight: 700; color: var(--text-muted); flex-shrink: 0;
    }

    .player-name { flex: 1; font-size: .97rem; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .player-actions { display: flex; gap: 2px; flex-shrink: 0; }

    /* ── Group chip ──────────────────────────────────────── */
    .group-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .72rem; font-weight: 700;
      padding: 2px 6px 2px 8px; border-radius: 20px;
      border: 1px solid; flex-shrink: 0;
      letter-spacing: .03em;
    }
    .group-chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .group-chip-x {
      background: none; border: none; cursor: pointer;
      color: inherit; font-size: .68rem; line-height: 1;
      padding: 0 1px; opacity: .6; border-radius: 3px;
      transition: opacity .15s;
    }
    .group-chip-x:hover { opacity: 1; }

    /* [NEW] Per-player group assign button */
    .btn-group-assign {
      font-size: .7rem; font-weight: 600; padding: 2px 7px;
      border: 1px dashed var(--border-hi); border-radius: 20px;
      background: none; color: var(--text-muted);
      cursor: pointer; font-family: inherit; flex-shrink: 0;
      transition: background .15s, color .15s, border-color .15s;
      white-space: nowrap; line-height: 1.6;
    }
    .btn-group-assign:hover {
      background: #f0fdfa; color: #0d9488;
      border-color: #5eead4; border-style: solid;
    }

    /* [NEW] Group picker dropdown */
    .group-picker {
      position: absolute; right: 0; top: calc(100% + 2px); z-index: 60;
      background: var(--surface); border: 1px solid var(--border-hi);
      border-radius: var(--radius-sm);
      box-shadow: 0 8px 24px rgba(0,0,0,.14);
      min-width: 186px; overflow: hidden;
      animation: popIn .15s ease;
    }
    .picker-header {
      font-size: .7rem; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; color: var(--text-muted);
      padding: 8px 13px 5px;
    }
    .picker-option {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 9px 13px; border: none; background: none;
      font-family: inherit; font-size: .88rem; font-weight: 500;
      color: var(--text); cursor: pointer; text-align: left;
      transition: background .12s;
    }
    .picker-option:hover { background: var(--surface2); }
    .picker-divider { height: 1px; background: var(--border); margin: 3px 0; }
    .picker-create { color: #0d9488; font-weight: 600; }
    .picker-empty { padding: 8px 13px; font-size: .82rem; color: var(--text-muted); }

    /* ── Group summary row ───────────────────────────────── */
    .group-summary-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .group-summary-chip {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .78rem; font-weight: 600;
      background: #f0fdfa; border: 1px solid #99f6e4;
      color: #0d9488; border-radius: 20px; padding: 3px 10px;
    }

    /* ── Empty ───────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 32px 0; color: var(--text-muted); font-size: .9rem; font-weight: 300; line-height: 2; }
    .empty-icon  { font-size: 2rem; margin-bottom: 6px; }

    /* ── Divider ─────────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    /* [MODIFIED] Team section — single-column cards for group-aware display */
    .team-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }

    .team-card { border-radius: var(--radius-sm); padding: 14px 16px; border: 1px solid; }
    .team-red    { background: #fff5f5; border-color: #fecaca; }
    .team-yellow { background: #fefce8; border-color: #fde68a; }
    .team-blue   { background: #eff6ff; border-color: #bfdbfe; }

    /* [MODIFIED] Team card header row */
    .team-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .team-emoji { font-size: 1.25rem; line-height: 1; }
    .team-name  { font-size: .92rem; font-weight: 700; }
    .team-red    .team-name { color: #dc2626; }
    .team-yellow .team-name { color: #b45309; }
    .team-blue   .team-name { color: #1d4ed8; }

    .team-count-badge {
      margin-left: auto;
      display: inline-block; font-size: .7rem; font-weight: 600;
      padding: 1px 8px; border-radius: 20px;
    }
    .team-red    .team-count-badge { background: #fee2e2; color: #dc2626; }
    .team-yellow .team-count-badge { background: #fef3c7; color: #b45309; }
    .team-blue   .team-count-badge { background: #dbeafe; color: #1d4ed8; }

    /* [MODIFIED] Team member rows */
    .team-members { list-style: none; }
    .team-members li {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; border-bottom: 1px solid var(--border);
      font-size: .88rem;
    }
    .team-members li:last-child { border-bottom: none; }
    .unit-names { flex: 1; font-weight: 500; }

    /* [NEW] Group label tag inside team card */
    .team-group-tag {
      font-size: .67rem; font-weight: 700; flex-shrink: 0;
      padding: 1px 7px; border-radius: 10px;
      border: 1px solid currentColor; opacity: .85; white-space: nowrap;
    }
    .team-group-tag.no-group {
      color: var(--text-muted); border-color: var(--border-hi); font-weight: 400;
    }

    /* [NEW] Warning banner above teams */
    .team-warning {
      background: #fef3c7; border: 1px solid #fde68a;
      border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: .85rem; font-weight: 500;
      color: #92400e; margin-bottom: 12px; line-height: 1.5;
    }

    /* ── Modal ───────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px); z-index: 100;
      align-items: flex-end; justify-content: center; padding: 0;
    }
    @media (min-width: 480px) { .modal-overlay { align-items: center; padding: 16px; } }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--surface); border: 1px solid var(--border-hi);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px 32px; width: 100%; max-width: 440px;
      animation: slideUp .22s ease;
    }
    @media (min-width: 480px) { .modal-box { border-radius: var(--radius); padding-bottom: 24px; animation: popIn .2s ease; } }

    .modal-handle { width: 36px; height: 4px; background: var(--surface2); border-radius: 2px; margin: 0 auto 20px; }
    @media (min-width: 480px) { .modal-handle { display: none; } }

    .modal-box h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 16px; }
    .modal-box input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-family: inherit;
      font-size: .95rem; padding: 11px 14px; outline: none; margin-bottom: 14px;
      transition: border-color .2s, box-shadow .2s;
    }
    .modal-box input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(63,185,80,.15); }
    .modal-buttons { display: flex; gap: 8px; }
    .modal-buttons .btn { flex: 1; }

    .confirm-icon  { font-size: 2rem; margin-bottom: 10px; }
    .confirm-text  { color: var(--text-muted); font-size: .9rem; font-weight: 300; line-height: 1.7; margin-bottom: 18px; }
    .confirm-text strong { color: var(--red); font-weight: 600; }

    /* ── Status ──────────────────────────────────────────── */
    .status-bar {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.connecting { background: #f59e0b; animation: pulse 1.2s infinite; }
    .status-dot.online     { background: #22c55e; }
    .status-dot.offline    { background: #ef4444; }
    .status-text { font-size: .78rem; color: var(--text-muted); font-weight: 500; }

    .version-tag {
      margin-top: 6px; font-size: .68rem; color: var(--text-muted);
      font-weight: 400; font-family: "SFMono-Regular", Consolas, monospace;
      opacity: .55; letter-spacing: .02em;
    }
    .version-hash { opacity: .7; }

    /* ── Animations ──────────────────────────────────────── */
    @keyframes slideIn  { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideUp  { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn    { from { opacity:0; transform:scale(.95); }       to { opacity:1; transform:scale(1); } }
    @keyframes shake    { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.3} }
    .shake { animation: shake .28s ease; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="app-header">
    <div class="header-icon">⚽</div>
    <h1>ลงชื่อเตะบอล</h1>
    <p>Paiboon FC</p>
    <div class="status-bar">
      <span id="statusDot" class="status-dot connecting"></span>
      <span id="statusText" class="status-text">กำลังเชื่อมต่อ...</span>
    </div>
    <div class="version-tag">v1.0.1</span></div>
  </div>

  <!-- Input card -->
  <div class="card">
    <div class="input-row">
      <input id="nameInput" type="text" placeholder="กรอกชื่อของคุณ..." maxlength="40" />
      <button id="addBtn" class="btn btn-green">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        ลงชื่อ
      </button>
    </div>
    <div id="inputError" class="input-error" aria-live="polite"></div>
  </div>

  <!-- Player list card -->
  <div class="card">
    <div id="groupSummaryRow"></div>
    <div class="section-label">
      ผู้เล่น
      <span class="count-pill" id="playerCount">0</span>
      คน
    </div>
    <div id="playerList">
      <div class="empty-state"><div class="empty-icon">🏃</div>ยังไม่มีใครลงชื่อ<br/>เป็นคนแรกสิ!</div>
    </div>
  </div>

  <!-- [MODIFIED] Actions card — removed "จับกลุ่ม" button, grouping is now per-player -->
  <div class="card">
    <button id="randomBtn" class="btn btn-purple" style="width:100%" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      สุ่มแบ่งทีม
    </button>
    <div style="margin-top:8px">
      <button id="clearBtn" class="btn btn-danger" style="width:100%" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        เคลียรายชื่อ (จบสัปดาห์)
      </button>
    </div>
  </div>

  <div id="teamSection"></div>

</div>

<!-- Edit modal -->
<div id="editModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <h3>✏️ แก้ไขชื่อ</h3>
    <input id="editInput" type="text" maxlength="40" />
    <div id="editError" class="input-error" style="margin-bottom:10px" aria-live="polite"></div>
    <div class="modal-buttons">
      <button id="cancelEditBtn" class="btn btn-ghost">ยกเลิก</button>
      <button id="saveEditBtn"   class="btn btn-green">บันทึก</button>
    </div>
  </div>
</div>

<!-- Confirm clear modal -->
<div id="confirmModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="confirm-icon">🗑️</div>
    <h3>เคลียข้อมูลสัปดาห์นี้?</h3>
    <!-- [MODIFIED] Updated text to mention groups are also cleared -->
    <p class="confirm-text">รายชื่อและข้อมูลกลุ่มทั้งหมดจะถูกลบออก<br/><strong>ไม่สามารถกู้คืนได้</strong></p>
    <div class="modal-buttons">
      <button id="confirmNo"  class="btn btn-ghost">ยกเลิก</button>
      <button id="confirmYes" class="btn btn-danger">ยืนยัน ลบเลย</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, addDoc, updateDoc, deleteDoc,
    doc, onSnapshot, serverTimestamp, writeBatch, getDocs, query, orderBy,
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { firebaseConfig } from "./firebase-config.js";

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const col  = collection(db, "players");
  const colG = collection(db, "groups");
  const q    = query(col, orderBy("createdAt", "asc"));

  // ── Group color palette ────────────────────────────────────
  const COLORS = [
    { dot:'#f97316', bg:'#fff7ed', border:'#fed7aa', label:'A' },
    { dot:'#d946ef', bg:'#fdf4ff', border:'#e9d5ff', label:'B' },
    { dot:'#14b8a6', bg:'#f0fdfa', border:'#99f6e4', label:'C' },
    { dot:'#6366f1', bg:'#eef2ff', border:'#c7d2fe', label:'D' },
    { dot:'#f43f5e', bg:'#fff1f2', border:'#fecdd3', label:'E' },
  ];

  // ── State ──────────────────────────────────────────────────
  let players             = [];
  let editingId           = null;
  let teamResult          = null;
  let groups              = [];
  let groupPickerPlayerId = null; // [NEW] player whose picker is open

  // ── DOM ────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const nameInput       = $("nameInput");
  const inputError      = $("inputError");
  const editError       = $("editError");
  const addBtn          = $("addBtn");
  const editInput       = $("editInput");
  const saveEditBtn     = $("saveEditBtn");
  const cancelEditBtn   = $("cancelEditBtn");
  const editModal       = $("editModal");
  const playerList      = $("playerList");
  const groupSummaryRow = $("groupSummaryRow");
  const playerCount     = $("playerCount");
  const randomBtn       = $("randomBtn");
  const clearBtn        = $("clearBtn");
  const teamSection     = $("teamSection");
  const confirmModal    = $("confirmModal");
  const confirmYes      = $("confirmYes");
  const confirmNo       = $("confirmNo");
  const statusDot       = $("statusDot");
  const statusText      = $("statusText");

  // ── Real-time listeners ────────────────────────────────────
  onSnapshot(q,
    snap => {
      players = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      setStatus("online");
      render();
    },
    () => setStatus("offline")
  );

  onSnapshot(colG, snap => {
    groups = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });

  function setStatus(s) {
    statusDot.className    = "status-dot " + s;
    statusText.textContent = s === "online" ? "เชื่อมต่อแล้ว" : "ไม่มีสัญญาณ";
  }

  // ── Render ─────────────────────────────────────────────────
  function render() {
    playerCount.textContent = players.length;
    randomBtn.disabled = players.length === 0;
    clearBtn.disabled  = players.length === 0;

    if (players.length === 0) {
      playerList.innerHTML = `<div class="empty-state"><div class="empty-icon">🏃</div>ยังไม่มีใครลงชื่อ<br/>เป็นคนแรกสิ!</div>`;
      groupSummaryRow.innerHTML = "";
      return;
    }

    const playerGroup = {};
    groups.forEach(g => g.playerIds.forEach(id => { playerGroup[id] = g; }));

    renderGroupSummary();
    renderPlayerList(playerGroup);
  }

  function renderGroupSummary() {
    if (groups.length === 0) { groupSummaryRow.innerHTML = ""; return; }
    const chips = groups.map(g => {
      const col   = COLORS[g.colorIdx % COLORS.length];
      const names = g.playerIds
        .map(id => players.find(p => p.id === id)?.name)
        .filter(Boolean).join(", ");
      return `<span class="group-summary-chip">
        <span style="width:8px;height:8px;border-radius:50%;background:${col.dot};flex-shrink:0;display:inline-block"></span>
        กลุ่ม ${col.label}: ${esc(names)}
      </span>`;
    }).join("");
    groupSummaryRow.innerHTML = `<div class="group-summary-row">${chips}</div>`;
  }

  // [MODIFIED] Per-player group assign button replaces select-mode flow
  function renderPlayerList(playerGroup) {
    playerList.innerHTML = players.map((p, i) => {
      const g   = playerGroup[p.id];
      const col = g ? COLORS[g.colorIdx % COLORS.length] : null;

      const groupUI = col
        ? `<span class="group-chip" style="background:${col.bg};border-color:${col.border};color:${col.dot}">
             <span class="group-chip-dot" style="background:${col.dot}"></span>
             กลุ่ม ${col.label}
             <button class="group-chip-x" data-action="chip" data-gid="${g.id}" data-pid="${p.id}" title="ยกเลิกกลุ่ม">✕</button>
           </span>`
        : `<button class="btn-group-assign" data-action="open-picker" data-pid="${p.id}">+ จัดกลุ่ม</button>`;

      const pickerHtml = groupPickerPlayerId === p.id ? renderGroupPicker(p.id) : "";

      return `<div class="player-item">
        <span class="player-num">${i + 1}</span>
        <span class="player-name">${esc(p.name)}</span>
        ${groupUI}
        <div class="player-actions">
          <button class="btn-icon" data-action="edit" data-id="${p.id}">✏️</button>
          <button class="btn-icon" data-action="del"  data-id="${p.id}">🗑️</button>
        </div>
        ${pickerHtml}
      </div>`;
    }).join("");
  }

  // [NEW] Inline dropdown for choosing a group
  function renderGroupPicker(playerId) {
    const groupOptions = groups.map(g => {
      const col   = COLORS[g.colorIdx % COLORS.length];
      const count = g.playerIds.filter(id => players.find(p => p.id === id)).length;
      return `<button class="picker-option" data-action="assign-group" data-pid="${playerId}" data-gid="${g.id}">
        <span style="width:9px;height:9px;border-radius:50%;background:${col.dot};flex-shrink:0;display:inline-block"></span>
        กลุ่ม ${col.label}
        <span style="color:var(--text-muted);font-size:.8em;margin-left:auto">${count} คน</span>
      </button>`;
    }).join("");

    const usedColors = new Set(groups.map(g => g.colorIdx));
    let nextColor = 0;
    while (usedColors.has(nextColor) && nextColor < COLORS.length) nextColor++;
    const createBtn = nextColor < COLORS.length
      ? `<div class="picker-divider"></div>
         <button class="picker-option picker-create" data-action="create-group" data-pid="${playerId}">
           <span style="font-size:.95rem;line-height:1">＋</span>
           สร้างกลุ่ม ${COLORS[nextColor].label} ใหม่
         </button>`
      : "";

    return `<div class="group-picker">
      <div class="picker-header">เลือกกลุ่ม</div>
      ${groupOptions || '<div class="picker-empty">ยังไม่มีกลุ่ม</div>'}
      ${createBtn}
    </div>`;
  }

  // ── Event delegation ───────────────────────────────────────
  playerList.addEventListener("click", e => {
    const el = e.target.closest("[data-action]");
    if (!el) return;
    e.stopPropagation();
    const { action, id, pid, gid } = el.dataset;
    if (action === "edit")          startEdit(id);
    if (action === "del")           deletePlayer(id);
    if (action === "chip")          ungroupPlayer(pid, gid);
    if (action === "open-picker")   openGroupPicker(pid);
    if (action === "assign-group")  assignPlayerToGroup(pid, gid);
    if (action === "create-group")  createGroupForPlayer(pid);
  });

  // [NEW] Close picker when tapping outside
  document.addEventListener("click", () => {
    if (groupPickerPlayerId !== null) {
      groupPickerPlayerId = null;
      render();
    }
  });

  // [NEW] Toggle group picker for a player
  function openGroupPicker(playerId) {
    groupPickerPlayerId = groupPickerPlayerId === playerId ? null : playerId;
    render();
  }

  // [NEW] Remove a single player from their group; delete group doc if it becomes empty
  async function ungroupPlayer(playerId, gid) {
    const g = groups.find(g => g.id === gid);
    if (!g) return;
    const remaining = g.playerIds.filter(id => id !== playerId);
    try {
      if (remaining.length === 0) await deleteDoc(doc(db, "groups", gid));
      else await updateDoc(doc(db, "groups", gid), { playerIds: remaining });
    } catch { alert("ยกเลิกกลุ่มไม่สำเร็จ"); }
  }

  // [NEW] Assign player to an existing group
  async function assignPlayerToGroup(playerId, targetGid) {
    const currentGroup = groups.find(g => g.playerIds.includes(playerId));
    const targetGroup  = groups.find(g => g.id === targetGid);
    if (!targetGroup || targetGroup.playerIds.includes(playerId)) {
      groupPickerPlayerId = null;
      render();
      return;
    }
    groupPickerPlayerId = null;
    try {
      const batch = writeBatch(db);
      if (currentGroup && currentGroup.id !== targetGid) {
        const remaining = currentGroup.playerIds.filter(id => id !== playerId);
        if (remaining.length === 0) batch.delete(doc(db, "groups", currentGroup.id));
        else batch.update(doc(db, "groups", currentGroup.id), { playerIds: remaining });
      }
      batch.update(doc(db, "groups", targetGid), {
        playerIds: [...targetGroup.playerIds, playerId],
      });
      await batch.commit();
    } catch { alert("จัดกลุ่มไม่สำเร็จ ลองใหม่"); }
  }

  // [NEW] Create a new group and assign this player to it
  async function createGroupForPlayer(playerId) {
    const usedColors = new Set(groups.map(g => g.colorIdx));
    let colorIdx = 0;
    while (usedColors.has(colorIdx) && colorIdx < COLORS.length) colorIdx++;
    if (colorIdx >= COLORS.length) colorIdx = groups.length % COLORS.length;

    const currentGroup = groups.find(g => g.playerIds.includes(playerId));
    groupPickerPlayerId = null;
    try {
      const batch = writeBatch(db);
      if (currentGroup) {
        const remaining = currentGroup.playerIds.filter(id => id !== playerId);
        if (remaining.length === 0) batch.delete(doc(db, "groups", currentGroup.id));
        else batch.update(doc(db, "groups", currentGroup.id), { playerIds: remaining });
      }
      batch.set(doc(colG), { colorIdx, playerIds: [playerId], createdAt: serverTimestamp() });
      await batch.commit();
    } catch { alert("สร้างกลุ่มไม่สำเร็จ ลองใหม่"); }
  }

  // ── Add ────────────────────────────────────────────────────
  async function addPlayer() {
    const name = nameInput.value.trim();
    if (!name) { shake(nameInput); showError("กรุณากรอกชื่อก่อนลงชื่อ"); return; }
    if (isDuplicate(name)) { shake(nameInput); showError(`"${name}" ลงชื่อไปแล้ว`); return; }
    clearError();
    addBtn.disabled = true;
    try {
      await addDoc(col, { name, createdAt: serverTimestamp() });
      nameInput.value = "";
      nameInput.focus();
    } catch { showError("เพิ่มไม่สำเร็จ ลองใหม่อีกครั้ง"); }
    finally { addBtn.disabled = false; }
  }

  addBtn.addEventListener("click", addPlayer);
  nameInput.addEventListener("keydown", e => { if (e.key === "Enter") addPlayer(); });
  nameInput.addEventListener("input", clearError);

  // ── Edit ───────────────────────────────────────────────────
  function startEdit(id) {
    const p = players.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    editInput.value = p.name;
    editModal.classList.add("open");
    setTimeout(() => editInput.focus(), 80);
  }

  saveEditBtn.addEventListener("click", async () => {
    const name = editInput.value.trim();
    if (!name) { shake(editInput); return; }
    if (isDuplicate(name, editingId)) { shake(editInput); showEditError(`"${name}" ลงชื่อไปแล้ว`); return; }
    clearEditError();
    try {
      await updateDoc(doc(db, "players", editingId), { name });
      closeModal(editModal);
    } catch { showEditError("แก้ไขไม่สำเร็จ ลองใหม่อีกครั้ง"); }
  });

  editInput.addEventListener("keydown", e => { if (e.key === "Enter") saveEditBtn.click(); });
  editInput.addEventListener("input", clearEditError);
  cancelEditBtn.addEventListener("click", () => closeModal(editModal));
  editModal.addEventListener("click", e => { if (e.target === editModal) closeModal(editModal); });

  function closeModal(el) { el.classList.remove("open"); editingId = null; clearEditError(); }

  // ── Delete ─────────────────────────────────────────────────
  async function deletePlayer(id) {
    try {
      const batch = writeBatch(db);
      batch.delete(doc(db, "players", id));
      for (const g of groups) {
        if (!g.playerIds.includes(id)) continue;
        const remaining = g.playerIds.filter(pid => pid !== id);
        if (remaining.length === 0) batch.delete(doc(db, "groups", g.id));
        else batch.update(doc(db, "groups", g.id), { playerIds: remaining });
      }
      await batch.commit();
    } catch { alert("ลบไม่สำเร็จ ลองใหม่อีกครั้ง"); }
  }

  // [FIXED - group integrity] Random teams — groups NEVER split across teams
  randomBtn.addEventListener("click", () => {
    if (!players.length) return;

    const N          = players.length;
    const groupedIds = new Set(groups.flatMap(g => g.playerIds));

    // STEP 1: build units — groups as indivisible objects, ungrouped as solo
    const allUnits = [
      ...groups
        .map(g => {
          const col     = COLORS[g.colorIdx % COLORS.length];
          const members = g.playerIds
            .map(id => players.find(p => p.id === id)?.name)
            .filter(Boolean);
          if (!members.length) return null;
          // type:'group' keeps all members together as one atomic unit
          return { type: 'group', members, groupLabel: `กลุ่ม ${col.label}`, groupColor: col.dot };
        })
        .filter(Boolean),
      ...players
        .filter(p => !groupedIds.has(p.id))
        .map(p => ({ type: 'solo', members: [p.name], groupLabel: null, groupColor: null })),
    ];

    const bigUnit = allUnits.find(u => u.type === 'group' && u.members.length > N / 2);

    // STEP 2: Fisher-Yates shuffle (operates on unit objects, never on individual members)
    function fisherYates(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // STEP 3: target sizes per team, shuffled so no team always gets the bigger slot
    const base        = Math.floor(N / 3);
    const extra       = N % 3;
    const baseTargets = [base + (extra > 0 ? 1 : 0), base + (extra > 1 ? 1 : 0), base];

    // STEP 4: greedy bin-packing
    function tryAssign(units, targets) {
      const teamUnits = [[], [], []];
      const teamSizes = [0, 0, 0];

      for (const unit of units) {
        const size = unit.members.length;

        if (unit.type === 'group') {
          // [FIXED - group integrity] Find teams with enough room for the ENTIRE group
          const canFit = [0, 1, 2].filter(i => targets[i] - teamSizes[i] >= size);
          let best;
          if (canFit.length > 0) {
            // Pick the fitting team with the most remaining capacity
            best = canFit.reduce((mi, i) =>
              (targets[i] - teamSizes[i]) > (targets[mi] - teamSizes[mi]) ? i : mi
            );
          } else {
            // [FIXED - group integrity] No team has exact room — assign whole group to
            // the team with the most remaining capacity. Allow overflow; NEVER split.
            const caps = targets.map((t, i) => t - teamSizes[i]);
            best = caps.reduce((mi, c, i) => c > caps[mi] ? i : mi, 0);
          }
          teamUnits[best].push(unit);
          teamSizes[best] += size;

        } else {
          // Solo player: team with most remaining capacity
          const caps = targets.map((t, i) => t - teamSizes[i]);
          const best = caps.reduce((mi, c, i) => c > caps[mi] ? i : mi, 0);
          teamUnits[best].push(unit);
          teamSizes[best] += 1;
        }
      }
      return { teamUnits, teamSizes };
    }

    // STEP 5: validate — group integrity is a hard requirement; balance is best-effort
    function validateGroupIntegrity(teamUnits) {
      const groupTeamMap = {};
      teamUnits.forEach((units, teamIdx) => {
        units.forEach(unit => {
          if (!unit.groupLabel) return;
          if (!groupTeamMap[unit.groupLabel]) groupTeamMap[unit.groupLabel] = new Set();
          groupTeamMap[unit.groupLabel].add(teamIdx);
        });
      });
      let ok = true;
      for (const [label, teamSet] of Object.entries(groupTeamMap)) {
        if (teamSet.size > 1) {
          console.error(`[GROUP INTEGRITY VIOLATION] ${label} แตกกระจายไป ${teamSet.size} ทีม`, [...teamSet]);
          ok = false;
        }
      }
      return ok;
    }

    // Retry up to 10 times; accept first attempt that passes both integrity + balance
    let finalTeamUnits = null;
    let finalTeamSizes = null;
    for (let attempt = 0; attempt < 10; attempt++) {
      const units   = fisherYates([...allUnits]);
      const targets = fisherYates([...baseTargets]);
      const { teamUnits, teamSizes } = tryAssign(units, targets);
      const balanced  = Math.max(...teamSizes) - Math.min(...teamSizes) <= 1;
      const integrity = validateGroupIntegrity(teamUnits);
      if (integrity && balanced) { finalTeamUnits = teamUnits; finalTeamSizes = teamSizes; break; }
      // Keep the last attempt as fallback (integrity always holds; balance may not)
      if (attempt === 9) { finalTeamUnits = teamUnits; finalTeamSizes = teamSizes; }
    }

    // Randomize which bucket maps to which colour
    const order = [0, 1, 2].sort(() => Math.random() - 0.5);
    const namedTeams = {
      red:    finalTeamUnits[order[0]],
      yellow: finalTeamUnits[order[1]],
      blue:   finalTeamUnits[order[2]],
    };

    // Debug output — inspect in DevTools to verify group integrity
    console.log('=== TEAM RESULT ===', {
      red:    namedTeams.red.map(u => ({ group: u.groupLabel || 'solo', members: u.members })),
      yellow: namedTeams.yellow.map(u => ({ group: u.groupLabel || 'solo', members: u.members })),
      blue:   namedTeams.blue.map(u => ({ group: u.groupLabel || 'solo', members: u.members })),
      sizes:  { red: namedTeams.red.reduce((s,u)=>s+u.members.length,0), yellow: namedTeams.yellow.reduce((s,u)=>s+u.members.length,0), blue: namedTeams.blue.reduce((s,u)=>s+u.members.length,0) },
    });

    teamResult = {
      ...namedTeams,
      warning: bigUnit
        ? `${bigUnit.groupLabel} มีสมาชิก ${bigUnit.members.length} คน (มากกว่าครึ่งของผู้เล่นทั้งหมด ${N} คน) — อาจทำให้ทีมไม่สมดุล`
        : null,
    };
    renderTeams();
    teamSection.scrollIntoView({ behavior: "smooth" });
  });

  // [MODIFIED] Render teams with grouped-unit rows
  function renderTeams() {
    if (!teamResult) { teamSection.innerHTML = ""; return; }
    const { red, yellow, blue, warning } = teamResult;
    const warnHtml = warning
      ? `<div class="team-warning">⚠️ ${esc(warning)}</div>`
      : "";
    teamSection.innerHTML = `
      <div class="card">
        ${warnHtml}
        <div class="section-label">ผลการแบ่งทีม</div>
        <div class="team-grid">
          ${teamCard("🔴","ทีมแดง",    "team-red",    red)}
          ${teamCard("🟡","ทีมเหลือง", "team-yellow", yellow)}
          ${teamCard("🔵","ทีมน้ำเงิน","team-blue",   blue)}
        </div>
        <div class="divider"></div>
        <button id="reshuffleBtn" class="btn btn-ghost" style="width:100%;font-size:.88rem">
          🔀 สุ่มใหม่อีกครั้ง
        </button>
      </div>`;
    $("reshuffleBtn").addEventListener("click", () => randomBtn.click());
  }

  // [MODIFIED] Each row = one unit, showing comma-separated names + group tag
  function teamCard(emoji, label, cls, unitList) {
    const count = unitList.reduce((s, u) => s + u.members.length, 0);
    const rows  = unitList.map(u => {
      const names = u.members.map(n => esc(n)).join(", ");
      const tag   = u.groupLabel
        ? `<span class="team-group-tag" style="color:${u.groupColor};border-color:${u.groupColor}">${esc(u.groupLabel)}</span>`
        : `<span class="team-group-tag no-group">ไม่มีกลุ่ม</span>`;
      return `<li><span class="unit-names">${names}</span>${tag}</li>`;
    }).join("");
    return `
      <div class="team-card ${cls}">
        <div class="team-card-header">
          <span class="team-emoji">${emoji}</span>
          <span class="team-name">${label}</span>
          <span class="team-count-badge">${count} คน</span>
        </div>
        <ul class="team-members">${rows || '<li><span class="unit-names" style="color:var(--text-muted)">—</span></li>'}</ul>
      </div>`;
  }

  // ── Clear (also clears groups) ─────────────────────────────
  clearBtn.addEventListener("click", () => confirmModal.classList.add("open"));
  confirmNo.addEventListener("click", () => closeModal(confirmModal));
  confirmModal.addEventListener("click", e => { if (e.target === confirmModal) closeModal(confirmModal); });

  confirmYes.addEventListener("click", async () => {
    closeModal(confirmModal);
    teamResult = null;
    teamSection.innerHTML = "";
    try {
      const [playerSnap, groupSnap] = await Promise.all([getDocs(col), getDocs(colG)]);
      const batch = writeBatch(db);
      playerSnap.forEach(d => batch.delete(d.ref));
      groupSnap.forEach(d => batch.delete(d.ref));
      await batch.commit();
    } catch { alert("เคลียไม่สำเร็จ ลองใหม่อีกครั้ง"); }
  });

  // ── Helpers ────────────────────────────────────────────────
  function isDuplicate(name, excludeId = null) {
    return players.some(p => p.id !== excludeId && p.name.trim().toLowerCase() === name.toLowerCase());
  }

  let errorTimer = null;
  function showError(msg) {
    inputError.textContent = "⚠️ " + msg;
    inputError.classList.add("show");
    clearTimeout(errorTimer);
    errorTimer = setTimeout(clearError, 3000);
  }
  function clearError()      { inputError.classList.remove("show"); clearTimeout(errorTimer); }
  function showEditError(msg){ editError.textContent = "⚠️ " + msg; editError.classList.add("show"); }
  function clearEditError()  { editError.classList.remove("show"); }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function shake(el) {
    el.classList.add("shake");
    el.addEventListener("animationend", () => el.classList.remove("shake"), { once: true });
  }
</script>
</body>
